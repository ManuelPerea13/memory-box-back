apiVersion: v1
kind: ConfigMap
metadata:
  name: memory-box-config
data:
  DB_HOST: "memory-box-db"
  DEBUG: "false"
  ALLOWED_HOSTS: "*"
  CORS_ALLOWED_ORIGINS: "https://innovbi.site,https://www.innovbi.site"
  CSRF_TRUSTED_ORIGINS: "https://api.innovbi.site"
  # URL del front para los QR de los pedidos
  FRONTEND_URL: "https://innovbi.site"
  # Broker/Backend de Celery (Redis en el mismo namespace)
  REDIS_URL: "redis://memory-box-redis:6379/0"
  # n8n deshabilitado por ahora (el código no llama a estos webhooks)
  N8N_WEBHOOK_URL: "http://memory-box-n8n:5678/webhook/new-order"
  N8N_WEBHOOK_FINALIZED_URL: "http://memory-box-n8n:5678/webhook/order-finalized"
