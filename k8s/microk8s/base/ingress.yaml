apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: memory-box-back
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: public
  tls:
    - hosts:
        - api.pos-service.cloud
      secretName: memory-box-back-tls
  rules:
    - host: api.pos-service.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: memory-box-back
                port:
                  number: 80
